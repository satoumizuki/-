<style>
  :root{
    --bg:#f5f5f4; --card:#ffffff; --line:#e7e5e0; --line2:#d6d3cc;
    --tx:#1c1c1a; --tx2:#6b6a64; --tx3:#9b9a92;
    --accent:#185fa5; --accent-bg:#e6f1fb;
    --warn:#854f0b; --warn-bg:#faeeda;
    --ok:#0f6e56; --ok-bg:#e1f5ee; --ok-solid:#1d9e75;
    --danger:#a32d2d;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1a1a18; --card:#2a2a27; --line:#3a3a36; --line2:#4a4a44;
      --tx:#f2f1ec; --tx2:#a8a79f; --tx3:#7a7a72;
      --accent:#85b7eb; --accent-bg:#0c447c;
      --warn:#fac775; --warn-bg:#633806;
      --ok:#5dcaa5; --ok-bg:#085041; --ok-solid:#1d9e75;
      --danger:#f09595;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;}
  .app{max-width:440px;margin:0 auto;min-height:100vh;padding:14px 12px 40px;}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:14px;}
  button{font-family:inherit;cursor:pointer;}

  /* setup */
  .setup{padding:26px 20px;}
  .setup h1{font-size:22px;font-weight:600;margin:0 0 4px;}
  .setup p.sub{color:var(--tx2);font-size:14px;margin:0 0 24px;}
  .label{font-size:13px;color:var(--tx2);margin:18px 0 8px;font-weight:500;}
  .course-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .course-btn{padding:16px 12px;border:1.5px solid var(--line2);background:var(--card);
    border-radius:12px;font-size:15px;font-weight:500;color:var(--tx);}
  .course-btn.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
  input[type=date],input[type=number]{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--line2);
    border-radius:10px;background:var(--card);color:var(--tx);}
  .primary{width:100%;padding:15px;border:none;border-radius:12px;background:var(--accent);
    color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;}
  .primary:disabled{opacity:.4;}
  @media (prefers-color-scheme: dark){.primary{color:#04244a;}}

  /* home */
  .head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--line);}
  .head .cn{font-size:14px;font-weight:500;}
  .head .gd{font-size:12px;color:var(--tx3);margin-top:2px;}
  .iconbtn{background:none;border:none;color:var(--tx3);font-size:19px;padding:4px;}
  .count{text-align:center;padding:20px 16px 6px;}
  .count .cap{font-size:13px;color:var(--tx2);}
  .count .big{font-size:44px;font-weight:600;line-height:1;margin-top:4px;}
  .count .big small{font-size:18px;color:var(--tx2);margin-left:5px;font-weight:500;}
  .count .big.over{color:var(--danger);}
  .donutwrap{display:flex;flex-direction:column;align-items:center;padding:8px 16px 4px;}
  .donut{position:relative;width:180px;height:180px;}
  .donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donut .pct{font-size:34px;font-weight:600;line-height:1;}
  .donut .pl{font-size:12px;color:var(--tx2);margin-top:2px;}
  .legend{display:flex;gap:18px;margin:10px 0 2px;font-size:13px;}
  .legend span{display:flex;align-items:center;gap:6px;color:var(--tx2);}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .week{margin:12px 16px 4px;padding:13px 16px;background:var(--accent-bg);border-radius:12px;
    display:flex;align-items:center;justify-content:space-between;}
  .week .wl{font-size:14px;color:var(--accent);font-weight:500;}
  .week .wv{font-size:22px;font-weight:600;color:var(--accent);}
  .week .wv small{font-size:13px;font-weight:400;margin-left:2px;}
  .banner{margin:12px 16px 4px;padding:12px 14px;border-radius:12px;display:flex;gap:10px;background:var(--warn-bg);}
  .banner .bi{font-size:20px;flex-shrink:0;}
  .banner .bt{font-size:13px;font-weight:600;color:var(--warn);}
  .banner .bs{font-size:12px;color:var(--warn);margin-top:2px;opacity:.9;}
  .bigbtn{margin:16px 16px 8px;}
  .hint{font-size:12px;color:var(--tx3);text-align:center;margin:8px 16px 0;}
  .road{margin:6px 0 2px;padding:14px 16px 8px;border-top:0.5px solid var(--line);}
  .road .rt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .road .rt span:first-child{font-size:13px;font-weight:600;color:var(--tx2);}
  .road .rt span:last-child{font-size:11px;color:var(--tx3);}
  .ritem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--line);}
  .ritem:last-child{border-bottom:none;}
  .ritem .rbox{font-size:19px;color:var(--tx3);flex-shrink:0;line-height:1;}
  .ritem.done .rbox{color:var(--ok);}
  .ritem .rnm{font-size:14px;flex:1;}
  .ritem.done .rnm{color:var(--tx3);text-decoration:line-through;}
  .ritem .rh{font-size:11px;color:var(--tx3);margin-left:6px;font-weight:400;}
  .road .rcap{font-size:11px;color:var(--tx3);line-height:1.55;margin-top:12px;padding-top:11px;border-top:1px solid var(--line2);}
  .ritem .rdate{font-size:12px;color:var(--tx3);flex-shrink:0;}
  .ritem.due .rnm{color:var(--warn);font-weight:500;}
  .ritem.due .rdate{color:var(--warn);font-weight:600;}

  /* update / list */
  .ubar{position:sticky;top:0;z-index:5;background:var(--bg);padding:6px 2px 8px;
    border-bottom:0.5px solid var(--line);margin:0 -2px;}
  .ubar .barrow{display:flex;align-items:center;gap:6px;}
  .homebtn{background:none;border:none;color:var(--accent);font-size:15px;font-weight:600;
    padding:6px 6px;flex:0 0 auto;}
  .chips{display:flex;gap:6px;overflow-x:auto;padding:2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;font-size:13px;padding:6px 13px;border:1px solid var(--line2);
    background:var(--card);border-radius:999px;color:var(--tx2);white-space:nowrap;}
  .chip.cap{border-color:var(--ok);color:var(--ok);}
  .uhead{padding:12px 4px 6px;}
  .uhead .ut{font-size:19px;font-weight:600;}
  .uhead .us{font-size:12px;color:var(--tx3);margin-top:2px;}
  .grp{margin-bottom:10px;overflow:hidden;scroll-margin-top:100px;}
  .grp .gh{width:100%;padding:13px 14px;display:flex;justify-content:space-between;align-items:center;
    font-size:14px;font-weight:600;background:var(--card);border:none;border-bottom:0.5px solid var(--line);
    color:var(--tx);cursor:pointer;}
  .grp.cap .gh{background:var(--ok-bg);color:var(--ok);}
  .gh .gc{font-size:12px;color:var(--tx3);font-weight:400;display:flex;align-items:center;gap:6px;}
  .gh .cv{font-size:10px;}
  .sub{font-size:12px;font-weight:600;color:var(--tx2);padding:10px 14px 4px;background:var(--card);}
  .trow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-bottom:0.5px solid var(--line);}
  .trow .cb{font-size:20px;color:var(--tx3);flex-shrink:0;background:none;border:none;padding:0;line-height:1;}
  .trow.done .cb{color:var(--ok);}
  .trow .tn{font-size:14px;flex:1;}
  .trow.done .tn{color:var(--tx3);text-decoration:line-through;}
  .trow .th{font-size:11px;color:var(--tx3);flex-shrink:0;}
  .trow .here{font-size:11px;color:var(--accent);border:1px solid var(--accent);background:transparent;
    border-radius:6px;padding:5px 9px;flex-shrink:0;font-weight:500;}
  .foot{text-align:center;margin-top:18px;}
  .foot button{background:none;border:none;color:var(--tx3);font-size:12px;text-decoration:underline;}
</style>
</head>

      const unmet = r.lead ? !stepStarted(r.step) : !capDone(r.name);
      if(!unmet) continue;
      if(r.design){ const past=r.off-dl; // 目安日を過ぎた日数でトーンを段階的に強める
        const e=DESIGN_ESC.find(x=>past>=x.past);
        if(e) return {icon:e.icon, title:e.title(r.name), sub:e.sub}; }
      return {icon:'🔥', title:r.msg, sub:r.sub};
    }
  }
  return null;
}
function capRoadmapHTML(){
  const dl=daysLeft(); const {items}=capPlan();
  const rows=items.map(r=>{
    const i=capIndex(r.name), done=i>=0&&isDone(i), due=!done && dl<=r.off;
    return `<div class="ritem ${done?'done':''} ${due?'due':''}" data-captoggle="${i}">
      <span class="rbox">${done?'☑':(due?'🔥':'☐')}</span>
      <span class="rnm">${r.name}<span class="rh">${r.h}h</span></span>
      <span class="rdate">${done?'完了':mdd(targetDate(r.off))+'目安'}</span></div>`;
  }).join('');
  return `<div class="road"><div class="rt"><span>卒業制作ロードマップ</span><span>週${weeklyH()}h換算の着手目安</span></div>${rows}
    <div class="rcap">各STEPにはレビュー・修正が入ります。目安日はその分を見込んで少し早めにしているので、焦らずに…。卒業日に間に合えばオールOK🙆</div></div>`;
}

const app=document.getElementById('app');
function render(){ if(!st){renderSetup();return;} if(st.view==='home'){renderHome();return;} renderUpdate(); }

function renderSetup(){
  app.innerHTML=`<div class="card setup">
    <h1>タスク（課題）確認を始めよう！</h1>
    <p class="sub">コースと卒業日を選ぶだけ。あとは毎日ボタンを押すだけです。</p>
    <div class="label">コースは？</div>
    <div class="course-row">
      <button class="course-btn" data-c="web">Web開発</button>
      <button class="course-btn" data-c="python">Python</button>
    </div>
    <div class="label">卒業日はいつ？<span style="color:var(--tx3);font-weight:400;font-size:12px;">※MVPリリース予定日を設定しましょう</span></div>
    <input type="date" id="gd">
    <div class="label">1週間にどれくらい勉強する？（あとで変更できます）</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="number" id="wh" value="20" min="1" max="100" step="1" style="width:120px">
      <span style="color:var(--tx2);font-size:14px;">時間 / 週</span></div>
    <button class="primary" id="start" style="margin-top:26px" disabled>はじめる</button>
  </div>`;
  let course=null; const gd=document.getElementById('gd'), sb=document.getElementById('start');
  const chk=()=>{sb.disabled=!(course&&gd.value);};
  app.querySelectorAll('.course-btn').forEach(b=>b.onclick=()=>{course=b.dataset.c;
    app.querySelectorAll('.course-btn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); chk();});
  gd.onchange=chk;
  sb.onclick=()=>{ const wh=Math.max(1, parseInt(document.getElementById('wh').value)||DEFAULT_WEEKLY_H);
    st={course, gradDate:gd.value, weeklyHours:wh, done:[], view:'update'}; save(); render(); };
}

function donutSVG(){
  const r=76, C=2*Math.PI*r, p=pct(), done=C*p/100;
  return `<svg viewBox="0 0 180 180" width="180" height="180">
    <circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--bg)" stroke-width="16"/>
    <circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--ok-solid)" stroke-width="16"
      stroke-linecap="round" stroke-dasharray="${done.toFixed(1)} ${(C-done).toFixed(1)}"
      transform="rotate(-90 90 90)"/></svg>`;
}

function renderHome(){
  const dl=daysLeft(), over=dl<0, rem=remaining(), done=doneCount();
  const pi=paceInfo();
  const co=coach();
  app.innerHTML=`<div class="card">
    <div class="head">
      <div><div class="cn">${COURSE_NAME[st.course]}</div><div class="gd">卒業日 ${fmt(st.gradDate)}</div></div>
      <button class="iconbtn" id="reset">⚙</button>
    </div>
    <div class="count">
      <div class="cap">${over?'卒業予定日から':'卒業日まで'}</div>
      <div class="big ${over?'over':''}">${Math.abs(dl)}<small>日${over?'経過':''}</small></div>
    </div>
    <div class="donutwrap">
      <div class="donut">${donutSVG()}<div class="ctr"><div class="pct">${pct()}%</div><div class="pl">完了</div></div></div>
      <div class="legend">
        <span><i class="dot" style="background:var(--ok-solid)"></i>終わった ${done}</span>
        <span><i class="dot" style="background:var(--bg);border:1px solid var(--line2)"></i>残り ${rem}</span>
      </div>
    </div>
    <div class="week"><div class="wl">${pi.label} までに終わらせたいタスク（課題）</div><div class="wv">${pi.quota}<small>個</small></div></div>
    ${co?`<div class="banner"><div class="bi">${co.icon||'🔥'}</div><div>
      <div class="bt">${co.title}</div><div class="bs">${co.sub}</div></div></div>`:''}
    ${capRoadmapHTML()}
    <div class="bigbtn"><button class="primary" id="toupd">📍 今ここまで進んだ</button></div>
    <div class="hint">進捗を更新したいときはこのボタンから。</div>
  </div>`;
  document.getElementById('toupd').onclick=()=>{st.view='update';save();render();};
  document.getElementById('reset').onclick=()=>{ const cur=weeklyH();
    const v=prompt('1週間の学習時間（時間）を入力してください。\nこれをもとに卒業制作の着手目安日が計算されます。', cur);
    if(v!==null){ st.weeklyHours=Math.max(1, parseInt(v)||cur); save(); render(); } };
  app.querySelectorAll('[data-captoggle]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.captoggle; if(i<0)return; const x=st.done.indexOf(i);
    if(x>=0)st.done.splice(x,1); else st.done.push(i); save(); render(); });
}

function renderUpdate(){
  const s=seq();
  const steps=[]; s.forEach(t=>{ if(!steps.includes(t.s)) steps.push(t.s); });
  // 何も開いていなければ、次にやる課題があるSTEPを自動で開く
  if(openSteps.size===0){
    let fi=s.findIndex((t,i)=>!isDone(i)); if(fi<0) fi=s.length-1;
    openSteps.add(steps.indexOf(s[fi].s));
  }
  // STEPごとの完了数
  const cnt={}; s.forEach((t,i)=>{ const k=t.s; (cnt[k]=cnt[k]||{d:0,n:0}).n++; if(isDone(i))cnt[k].d++; });

  let html=`<div class="ubar">
    <div class="barrow"><button class="homebtn" id="home">‹ ホーム</button>
    <div class="chips">${steps.map((st_,ix)=>`<button class="chip${st_==='卒業制作'?' cap':''}" data-jump="${ix}">${st_}</button>`).join('')}</div></div>
  </div>
  <div class="uhead"><div class="ut">今ここまで進んだ？</div>
    <div class="us">やり終えた課題で「ここまで」を押すとそこまで一括完了。飛ばした課題は □ で外せます。STEP名をタップで開閉。</div></div>`;

  let cs=null, cc=null;
  s.forEach((t,i)=>{
    if(t.s!==cs){
      if(cs!==null) html+='</div></div>'; // close .gb と .grp
      cs=t.s; cc=null;
      const ix=steps.indexOf(t.s), open=openSteps.has(ix);
      html+=`<div class="card grp ${t.s==='卒業制作'?'cap':''}" id="grp-${ix}">
        <button class="gh" data-step="${ix}"><span>${t.s}</span>
          <span class="gc">${cnt[t.s].d}/${cnt[t.s].n}<i class="cv">${open?'▲':'▼'}</i></span></button>
        <div class="gb" ${open?'':'style="display:none"'}>`;
    }
    if(t.c!==cc && t.s!=='卒業制作'){ cc=t.c; html+=`<div class="sub">${t.c}</div>`; }
    const d=isDone(i);
    html+=`<div class="trow ${d?'done':''}">
      <button class="cb" data-toggle="${i}">${d?'☑':'☐'}</button>
      <span class="tn">${t.t}</span><span class="th">${t.h}h</span>
      <button class="here" data-here="${i}">ここまで</button></div>`;
  });
  html+=`</div></div><div class="foot"><button id="reset2">設定をリセット</button></div>`;
  app.innerHTML=html;

  document.getElementById('home').onclick=()=>{ st.view='home'; save(); render(); };
  document.getElementById('reset2').onclick=()=>{ if(confirm('設定をリセットして最初からやり直しますか？（進捗も消えます）')){localStorage.removeItem(KEY);st=null;openSteps.clear();render();} };
  app.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{ const ix=+b.dataset.step;
    if(openSteps.has(ix)) openSteps.delete(ix); else openSteps.add(ix); render(); });
  app.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{ const ix=+b.dataset.jump;
    openSteps.add(ix); render();
    const el=document.getElementById('grp-'+ix); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); });
  app.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.toggle; const x=st.done.indexOf(i);
    if(x>=0)st.done.splice(x,1); else st.done.push(i); save(); render(); });
  app.querySelectorAll('[data-here]').forEach(b=>b.onclick=()=>{ const i=+b.dataset.here;
    for(let k=0;k<=i;k++) if(!st.done.includes(k)) st.done.push(k); save(); render(); });
}

function fmt(d){ const p=d.split('-'); return p[0]+'/'+p[1]+'/'+p[2]; }
render();
</script>
</body>
</html>
